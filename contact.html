<!DOCTYPE html>
<html lang="tr">
 <head>
    <title>Contact</title>
    <meta charset="utf-8" name="viewport" content="width=device-witdth, inital-scale=1.0 ">
    <link rel="stylesheet" href="style.css"> 
 </head>

 <body>
    <!-- <form action="contact.js" method="post" onsubmit=" JS isFormValid "></form> -->
    <header>
        <nav class="main-nav">
            <a style="font-weight: bold; font-size: x-large;" href="index.html">Main Page</a>
            <div class="header-nav">
                <a href="cv.html">CV</a>
                <a href="contact.html">Contact</a>
                <a href="mycity.html">My City</a>
            </div>
            <a class="nav-act" href="login.html">Login</a>
        </nav>
    </header>
    <main>
        <h2>Bize Ulaşın</h2>
        
        <form id="contactForm" method="post" action="server.php">
            <fieldset>
                <legend>Kişisel Bilgiler</legend>
                <div class="cont_box">
                <label for="name">Ad Soyad</label><b></b>
                <input type="text" id="Name" placeholder="Adınızı ve Soyadınızı giriniz..."><br><br>
                    <div class="error" id="n_error"></div>
                </div>
            </fieldset>
        
            <fieldset>
                <legend>İletişim Tercihi</legend>
                <div class="pref_button">
                    <button type="button" name="prefCont" value="e-mail" onclick="emailshow()">E-posta</button>
                    <button type="button" name="prefCont" value="phone" onclick="phoneshow()">Telefon</button>
                </div>
                    <div class="error" id="c_error" ></div>
                <div class="pref_cont" id="e-mail_box">
                    <label for="email">E-posta Adresi</label>
                    <input type="email" id="email" placeholder="ornek@mail.com"><br>
                        <div class="error" id="e_error"></div>
                </div>
                <div class="pref_cont" id="phone_box">
                    <label for="phone">Telefon Numarası</label>
                    <input type="tel" id="phone" placeholder="5XXXXXXXXX">
                        <div class="error" id="p_error"></div>
                </div>
            </fieldset>
            <fieldset>
                <div class="cont_box">
                    <label for="message">Mesajınız</label><br>
                    <textarea id="message" rows="4" placeholder="Mesajınızı yazınız..."></textarea>
                </div>
            </fieldset>

            <button type="submit" name="contact" value="contact_form">Gönder</button>
        </form>
    </main>
    <script>
        let e_show=false;
        let p_show = false;
        let name_error=document.getElementById('n_error');
        let pref_error=document.getElementById('c_error');
        let email_error=document.getElementById('e_error');
        let phone_error=document.getElementById('p_error');
        
        const form = document.getElementById('contactForm');
        const nameRegex = /^[a-zA-ZğüşıöçĞÜŞİÖÇ ]{2,30}$/;
        const emailRegex = /^[bBgGcCAa]\d{10}@sakarya\.edu\.tr$/;
        const phoneRegex = /^5[0-9]{9}$/;
        
        const email_box=document.getElementById('e-mail_box');
        const phone_box=document.getElementById('phone_box');
        function emailshow(){
            if (e_show==false) {
                e_show=true;
                email_box.style.display='flex';
            }else{e_show=false;email_box.style.display='none';}
        };
        function phoneshow() {
            if (p_show==false) {
                p_show=true;
                phone_box.style.display='flex';
            }else{p_show=false;phone_box.style.display='none';}
        };

        form.addEventListener('submit',function(e) {
            e.preventDefault();

            n_error.textContent = '';
            c_error.textContent = '';
            e_error.textContent = '';
            p_error.textContent = '';

            const name_ = document.getElementById('name').value.trim();
            const email_ = document.getElementById('email').value.trim();
            const phone_ = document.getElementById('phone').value.trim();
            const message_= document.getElementById('message').value.trim();
            let isValid = true;


            if (name_===""||!nameRegex.test(name_)) {
                name_error.textContent="Lütfen Geçerli Bir Değer Girin.";
                isValid = false;
            }if(!e_show && !p_show){
                isValid = false;
                pref_error.textContent="Lütfen En Az Bir Yöntemi Seçiniz";
            }if (e_show &&!emailRegex.test(email_)) {
                isValid = false; 
                email_error.textContent="Lütfen Geçerli E-posta Girin";               
            }if (p_show && !phoneRegex.test(phone_)) {
                isValid = false; 
                phone_error.textContent="Lütfen Geçerli Bir Telefon Numarası Girin";               
            }
            if (isValid) form.submit();
        })
    </script>
    <div class="footer">
        <footer>
            <p>   Web Projesi   </p>
        </footer>
    </div>
 </body>

</html>
